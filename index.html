<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gustavo Pinho Maia — PhD researcher in Chemistry (Astrobiology): mechanochemical and shock-driven synthesis of organic molecules relevant to the origin of life.">
  <title>Gustavo Pinho Maia · Astrobiology Research</title>

  <!-- Fonts used by the design system -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Skip link for keyboard / screen-reader users -->
  <a class="skip-link" href="#mainContent">Skip to content</a>

  <!-- Animated starfield (script.js -> initStarfield) -->
  <canvas id="starfield" aria-hidden="true"></canvas>

  <!-- ================= NAV ================= -->
  <header class="nav">
    <div class="nav-inner">
      <a class="nav-logo" href="#about">Gustavo<span>.</span>Maia</a>

      <button class="nav-toggle" id="navToggle" type="button"
              aria-label="Open menu" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav-links" id="navLinks" aria-label="Primary">
        <a href="#about">About</a>
        <a href="#education">Education</a>
        <a href="#experience">Experience</a>
        <a href="#presentations">Presentations</a>
        <a href="#publications">Publications</a>
        <a href="#tutoring">Tutoring</a>
      </nav>
    </div>
  </header>

  <!-- ================= SPA CONTENT ================= -->
  <main class="site" id="mainContent">
    <!-- Sections are injected here by loadSections() -->
  </main>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-copy">© <span id="footerYear"></span> Gustavo Pinho Maia · Astrobiology Research</p>
      <nav class="footer-social" aria-label="Profiles">
        <a href="https://orcid.org/0000-0001-5314-8816" target="_blank" rel="noopener noreferrer">ORCID</a>
        <a href="https://www.linkedin.com/in/gustavopinhomaia" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://www.researchgate.net/profile/Gustavo_Maia2" target="_blank" rel="noopener noreferrer">ResearchGate</a>
        <a href="mailto:gustavopinho.maia@mnhn.fr">Email</a>
      </nav>
    </div>
  </footer>

  <script>
    // ---- Dynamic section loader ----------------------------------------
    // Tries sections/<name>.html first (folder layout), then <name>.html
    // (flat layout) so it works regardless of how the files are deployed.
    async function fetchSection(name) {
      const paths = [`sections/${name}.html`, `${name}.html`];
      for (const p of paths) {
        try {
          const res = await fetch(p);
          if (res.ok) return await res.text();
        } catch (e) { /* try next path */ }
      }
      console.warn(`Could not load section: ${name}`);
      return "";
    }

    async function loadSections() {
      const sections = ['hero', 'education', 'experience', 'presentations', 'publications', 'tutoring'];
      const container = document.getElementById('mainContent');
      for (const name of sections) {
        const html = await fetchSection(name);
        if (html) container.insertAdjacentHTML('beforeend', html);
      }
      // Re-run the app now that the dynamic content exists.
      if (window.SiteApp && typeof window.SiteApp.init === 'function') {
        window.SiteApp.init();
      }
    }

    const yEl = document.getElementById('footerYear');
    if (yEl) yEl.textContent = new Date().getFullYear();

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadSections);
    } else {
      loadSections();
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
